<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="web.css">
    <title>Task List</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div id="main" class="card">
                    <div class="card-content">
                        <span class="card-title">Task List</span>
                        <div class="row">
                            <form id="task-form">
                                <div class="form-group">
                                    <input type="text" name="task" id="task" value="walk the dog" placeholder="Add Task">
                                    <label for="task">Add Task</label>
                                </div>
                            </form>
                        </div>
                        <div class="card-header">
                            <h3 id="task-title">Task List</h3>
                        </div>
                        <div class="card-body">
                            <ul class="list-group">
                                <li class="list-group-item">Task 1</li>
                                <li class="list-group-item">Task 2</li>
                                <li class="list-group-item">Task 3</li>
                                <li class="list-group-item">Task 4</li>
                                <li class="list-group-item">Task 5</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
       <a href="#" class="clear-task-btn">Clear Tasks</a>
    </div>
    
    <script src="web.js"></script>
    <script src="DOMtraversing.js"></script>
    <script src="createElement.js"></script>
    <script src="mouseevent.js"></script>
    <script src="keyboardEvents.js"></script>
    <script src="eventDelegation.js"></script>
    <script src="localstoragesessionstorage.js"></script>
</body>
</html>
