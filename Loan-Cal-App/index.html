<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #loading, #results{
            display: none;
        }
    </style>
</head>
<body class="bg-dark">
<div class="container">
    <div class="row">
       <div class="col-md-6 mx-auto">
         <div class="card card-body text-center mt-5">
            <h1 class="heading display-5 pb-3">Loan Calculator</h1>
            <form id="loan-form">
                <div class="mb-3 form-group">
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" id="loan_amount" placeholder="Loan Amount" class="form-control"/>   
                    </div>
                </div>
                <div class="mb-3 form-group">
                    <div class="input-group">
                        <span class="input-group-text">%</span>
                        <input type="number" id="interest_rate" placeholder="Interest Rate" class="form-control"/>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <span class="input-group-text">Years</span>   
                        <input type="number" id="loan_term" placeholder="Loan Term" class="form-control"/>
                    </div>
                </div>
                 <div class="form-group"><br>
                    <input type="submit" value="Calculate" class="btn btn-dark btn-block" id="calculate-btn"/>
                 </div>   
            </form> 

            <!-- loading -->
             <div id="loading">
                <div class="text-muted">Calculating...</div>
                <div class="spinner-border text-dark" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div> 
             </div>
             <!-- results -->
            <div id="results" class="pt-4">
                <h5>Results</h5>
                <div class="mb-3 form-group">
                    <div class="input-group">
                        <span class="input-group-text">Monthly Payment</span>
                        <input type="text" id="monthly_payment" class="form-control" disabled/>
                    </div>
                </div>
                <div class="mb-3 form-group">
                    <div class="input-group">
                        <span class="input-group-text">Total Payment</span>
                        <input type="text" id="total_payment" class="form-control" disabled/>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <span class="input-group-text">Total Interest</span>
                        <input type="text" id="total_interest" class="form-control" disabled/>
                    </div>
                </div>
            </div>           
         </div> 
       </div>         
    </div>
</div> 
<script src="app.js"></script>   
</body>
</html>
